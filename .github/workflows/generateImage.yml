name: Build and Push Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Retrieve latest version tag from ECR
        id: get_latest_version
        run: |
          REPO_NAME=${{ vars.ECR_REPO }}
          ECR_URI=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/$REPO_NAME

          # Get the list of image tags
          TAGS=$(aws ecr list-images --repository-name $REPO_NAME --query 'imageIds[*].imageTag' --output text)
          
          # Filter version tags (e.g., v1.0.0)
          CURMAJ=${{ vars.CURMAJ }}
          CURMIN=${{ vars.CURMIN }}
          VERSION_TAGS=$(echo $TAGS | tr ' ' '\n' | grep -E "^v${CURMAJ}\.${CURMIN}\.[0-9]+$" || echo "")
          
          if [ -z "$VERSION_TAGS" ]; then
            NEW_VERSION="v$CURMAJ.$CURMIN.0"
            echo 'No version found in ECR'
          else
            # Find the latest version
            LATEST_VERSION=$(echo ${VERSION_TAGS//v/} | tr ' ' '\n' | sort -V | tail -n 1)
            
            # Increment the version
            IFS='.' read -r -a VERSION_PARTS <<< "${LATEST_VERSION}"
            MAJOR=${VERSION_PARTS[0]}
            MINOR=${VERSION_PARTS[1]}
            PATCH=${VERSION_PARTS[2]}
            PATCH=$(($PATCH + 1))
            NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
          fi

          echo $NEW_VERSION
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

      - name: Build Docker image with version and latest tags
        run: |
          docker build -t ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPO }}:${{ env.NEW_VERSION }} \
                       -t ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPO }}:latest .

      - name: Push Docker image with version tag
        run: |
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPO }}:${{ env.NEW_VERSION }}

      - name: Push Docker image with latest tag
        run: |
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPO }}:latest